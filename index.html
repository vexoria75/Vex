<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vex</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #fdf0f5;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  position: relative;
  overflow: hidden;
}

.b { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
.b1 { width: 500px; height: 500px; background: radial-gradient(circle, #f9a8d4, transparent 70%); filter: blur(80px); top: -150px; left: -150px; opacity: 0.55; }
.b2 { width: 450px; height: 450px; background: radial-gradient(circle, #ffffff, transparent 70%); filter: blur(70px); bottom: -100px; right: -100px; opacity: 0.85; }
.b3 { width: 350px; height: 350px; background: radial-gradient(circle, #fecdd3, transparent 70%); filter: blur(90px); top: 40%; left: 40%; opacity: 0.35; }

.card {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 340px;
  background: rgba(255,255,255,0.62);
  backdrop-filter: blur(32px) saturate(1.6);
  -webkit-backdrop-filter: blur(32px) saturate(1.6);
  border: 1px solid rgba(255,255,255,0.92);
  border-radius: 24px;
  box-shadow: 0 8px 48px rgba(236,72,153,0.1), 0 2px 8px rgba(0,0,0,0.04);
  overflow: hidden;
}

.banner {
  height: 90px;
  background: linear-gradient(135deg, #fce7f3, #fdf2f8, #fce7f3);
  position: relative;
  overflow: hidden;
}
.bg1 { position: absolute; width: 180px; height: 180px; background: radial-gradient(circle, rgba(249,168,212,0.55), transparent 70%); filter: blur(28px); top: -60px; left: -20px; }
.bg2 { position: absolute; width: 160px; height: 160px; background: radial-gradient(circle, rgba(255,255,255,0.75), transparent 70%); filter: blur(24px); top: -40px; right: 0; }

.avatar-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 20px;
  margin-top: -30px;
  position: relative;
  z-index: 2;
  margin-bottom: 12px;
}
.avatar {
  width: 60px;
  height: 60px;
  border-radius: 16px;
  border: 3px solid white;
  box-shadow: 0 4px 16px rgba(236,72,153,0.2);
  overflow: hidden;
  flex-shrink: 0;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

.pill {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(255,255,255,0.88);
  border: 1px solid rgba(255,255,255,0.95);
  border-radius: 100px;
  padding: 5px 12px;
  font-size: 11px;
  font-weight: 600;
  color: #be185d;
  backdrop-filter: blur(10px);
  box-shadow: 0 2px 8px rgba(236,72,153,0.08);
  white-space: nowrap;
}
.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #f472b6;
  box-shadow: 0 0 5px rgba(244,114,182,0.8);
  animation: pulse 2s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.4)} }

.content { padding: 0 20px 18px; }

.name { font-size: 20px; font-weight: 800; color: #1a1a2e; letter-spacing: -0.5px; margin-bottom: 2px; }
.handle { font-size: 12px; color: #c084a0; margin-bottom: 16px; }

.stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; margin-bottom: 14px; }
.stat { background: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.92); border-radius: 12px; padding: 10px 6px; text-align: center; }
.stat-n { font-size: 16px; font-weight: 800; color: #1a1a2e; letter-spacing: -0.3px; }
.stat-l { font-size: 9px; font-weight: 600; color: #c084a0; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

.line { height: 1px; background: linear-gradient(90deg, transparent, rgba(244,114,182,0.15), transparent); margin: 12px 0; }

.badges { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }
.badge { font-size: 10px; font-weight: 600; padding: 4px 10px; border-radius: 100px; background: rgba(255,255,255,0.72); border: 1px solid rgba(244,114,182,0.18); color: #be185d; }

.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.bar-row:last-child { margin-bottom: 0; }
.bar-lbl { font-size: 10px; font-weight: 500; color: #c084a0; width: 56px; flex-shrink: 0; }
.bar-track { flex: 1; height: 4px; background: rgba(244,114,182,0.1); border-radius: 100px; overflow: hidden; }
.bar-fill { height: 100%; background: linear-gradient(90deg, #fbcfe8, #ec4899); border-radius: 100px; transition: width 1s cubic-bezier(.4,0,.2,1); }
.bar-n { font-size: 10px; font-weight: 700; color: #c084a0; width: 22px; text-align: right; }

.foot { border-top: 1px solid rgba(244,114,182,0.08); padding: 11px 20px; display: flex; align-items: center; justify-content: space-between; }
.foot-txt { font-size: 10px; color: #d4a0b5; }
.foot-btn { font-size: 11px; font-weight: 700; color: #ec4899; text-decoration: none; }
</style>
</head>
<body>

<div class="b b1"></div>
<div class="b b2"></div>
<div class="b b3"></div>

<div class="card">
  <div class="banner">
    <div class="bg1"></div>
    <div class="bg2"></div>
  </div>

  <div class="avatar-row">
    <div class="avatar">
      <!-- FIXED: Using image0.jpg from the same folder instead of broken base64 -->
      <img src="image0.jpg" alt="avatar" style="width:100%;height:100%;object-fit:cover;display:block;">
    </div>

  </div>

  <div class="content">
    <div class="name">Vex</div>
    <div class="handle">@vexoria75</div>

    <div class="stats">
      <div class="stat"><div class="stat-n">254</div><div class="stat-l">Visits</div></div>
      <div class="stat"><div class="stat-n">135</div><div class="stat-l">Friends</div></div>
      <div class="stat"><div class="stat-n">159</div><div class="stat-l">Wins</div></div>
    </div>

    <div class="line"></div>

    <div class="badges">
      <div class="badge">Defender</div>
      <div class="badge">Ghost Mode</div>
      <div class="badge">Elite</div>
    </div>

    <div class="bar-row">
      <div class="bar-lbl">Stealth</div>
      <div class="bar-track"><div class="bar-fill" style="width:95%"></div></div>
      <div class="bar-n">95</div>
    </div>
    <div class="bar-row">
      <div class="bar-lbl">Speed</div>
      <div class="bar-track"><div class="bar-fill" style="width:88%"></div></div>
      <div class="bar-n">88</div>
    </div>
    <div class="bar-row">
      <div class="bar-lbl">Defense</div>
      <div class="bar-track"><div class="bar-fill" style="width:100%"></div></div>
      <div class="bar-n">100</div>
    </div>
  </div>

  <div class="foot">
    <div class="foot-txt">vexoria75.github.io</div>

  </div>
</div>

</body>
</html>
